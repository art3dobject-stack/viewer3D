<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Viewer 3D Premium</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
            font-family: Arial, sans-serif;
        }
        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.9);
            padding: 15px;
            border-radius: 8px;
            z-index: 10;
        }
        .panel {
            margin-bottom: 15px;
        }
        canvas {
            display: block;
        }
    </style>
</head>

<body>

    <div id="ui">
        <div class="panel">
            <h2>Importer un modèle</h2>
            <input type="file" id="fileInput" accept=".stl">
        </div>

        <div class="panel">
            <h2>Couleur</h2>
            <input type="color" id="colorPicker" value="#00e5ff">
        </div>

        <div class="panel">
            <h2>Contrôles</h2>
            <button id="resetBtn">Réinitialiser</button>
            <button id="autoBtn">Auto-rotation</button>
        </div>
    </div>

    <canvas id="viewer"></canvas>

    <!-- Three.js + outils -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/loaders/STLLoader.js"></script>

    <!-- Ton script -->
    <script src="viewer.js"></script>

</body>
</html>
