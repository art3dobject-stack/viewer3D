<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>3D Viewer Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ui">
    <div class="panel">
        <h2>Importer un modèle</h2>
        <input type="file" id="fileInput" accept=".stl,.glb,.gltf">
    </div>

    <div class="panel">
        <h2>Couleur</h2>
        <input type="color" id="colorPicker" value="#00e5ff">
    </div>

    <div class="panel">
        <h2>Contrôles</h2>
        <button id="resetBtn">Réinitialiser</button>
        <button id="autoBtn">Auto‑rotation</button>
    </div>
</div>

<canvas id="viewer"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script src="viewer.js"></script>

</body>
</html>
